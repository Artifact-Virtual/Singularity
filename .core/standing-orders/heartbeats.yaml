# Standing Orders — Executive Heartbeats
# Imported from: executives/register_standing_orders.py
# These become PULSE scheduled events in Singularity.
#
# Each order defines a periodic audit task for an executive.
# The Coordinator picks these up and dispatches them via the bus.

orders:

  - name: "CTO Heartbeat"
    role: cto
    schedule: "0 */4 * * *"     # every 4 hours
    model: "claude-sonnet-4"
    task: |
      Periodic check-in. Do the following:
      1. Check system health: run `df -h /` and `free -m` and report concerns
      2. Check git repos for uncommitted work
      3. Check if key services are running (mach6-gateway, singularity)
      4. Review logs for errors
      5. Check HEKTOR memory daemon status
      Report findings structured. Only report issues — if green, say so briefly.

  - name: "COO Heartbeat"
    role: coo
    schedule: "30 9,17 * * *"   # 2:30 PM and 10:30 PM PKT
    model: "claude-sonnet-4"
    task: |
      Periodic check-in. Do the following:
      1. Check today's memory file — summarize accomplishments
      2. Check pending cron/scheduled tasks
      3. Review HEARTBEAT.md for overdue items
      4. Check if daily journal was written
      Report operational status and what needs attention.

  - name: "CFO Heartbeat"
    role: cfo
    schedule: "0 10 * * 1,4"    # Monday and Thursday 3:00 PM PKT
    model: "claude-sonnet-4"
    task: |
      Periodic check-in. Do the following:
      1. Check GCP billing status
      2. Check GCP VM status (is it running and burning money?)
      3. Check disk usage trends
      4. Review funding application deadlines
      Flag cost concerns or upcoming financial deadlines.

  - name: "CISO Heartbeat"
    role: ciso
    schedule: "0 8 * * *"       # daily 1:00 PM PKT
    model: "claude-sonnet-4"
    task: |
      Periodic security check. Do the following:
      1. Check failed SSH attempts (last 24h)
      2. Check listening ports
      3. Check for suspicious processes (top by memory)
      4. Check file permissions on .env and config.json
      5. Check firewall status
      Flag any security concerns immediately.
