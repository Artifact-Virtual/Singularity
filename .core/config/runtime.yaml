# Singularity Runtime Configuration
# Merged from: ~/.plug/config.json + executives/plug-csuite-config.json
# Imported: Day 19 (2026-03-03)
# This is what Aria reads at boot.

# ── Voice (LLM Providers) ──
voice:
  primary: "claude-opus-4.6"
  fallbacks:
    - "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
  proxy:
    base_url: "http://localhost:3000/v1"
    api_key: "n/a"
    timeout: 120.0
  temperature: 0.3
  max_tokens: 8192

  # C-Suite uses a lighter model (executives don't need Opus)
  csuite:
    primary: "claude-sonnet-4"
    fallbacks:
      - "gemini-2.0-flash"
      - "gpt-4.1-mini"
    temperature: 0.5
    max_tokens: 4096

  # Degraded mode (when cloud proxy is down)
  degraded:
    model: "qwen2.5-coder:7b"
    base_url: "http://localhost:11434/v1"
    max_tokens: 2048
    system_prefix: "[DEGRADED MODE - Local model, be concise]"

# ── Nerve (Channel Adapters) ──
nerve:
  discord:
    bot_user_id: "1472994585583030366"
    guild_ids:
      - "1326925607589642352"     # ARTIFACT VIRTUAL
      - "1405819130921091174"     # AVA's server
    require_mention: false
    dm_policy: "deny"
    dm_allowlist:
      - "193011943382974466"       # Ali
    status_message: "⚡ Aria Online"
    max_message_length: 2000
    reconnect_delay: 5.0
    max_reconnect_delay: 300.0
    sister_bot_ids:
      - "1459121107641569291"      # AVA (Mach6)
    # Token loaded from vault at runtime

  whatsapp:
    enabled: false  # Aria doesn't have WhatsApp — AVA handles that

# ── Cortex (Agent Config) ──
cortex:
  workspace: "/home/adam/workspace/enterprise"
  exec_timeout: 30
  exec_max_output: 50000
  compaction:
    enabled: true
    max_context_tokens: 115000
    target_tokens: 70000

# ── PULSE (Budget) ──
pulse:
  default_cap: 20
  expanded_cap: 40        # was 100, reduced after Day 19 Aria loop incident
  nudge_limit: 2          # max nudge injections per conversation

# ── C-Suite Personas ──
