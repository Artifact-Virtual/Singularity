# ── Daemon ──
daemon:
  auto_restart: true
  max_restarts: 5
  restart_window: 300    # seconds

# ── Webhooks (C-Suite Dispatch — legacy, being replaced by native bus) ──
webhooks:
  # Webhook URLs loaded from vault at runtime — see .env.example
  ava:  "${WEBHOOK_AVA}"
  cto:  "${WEBHOOK_CTO}"
  coo:  "${WEBHOOK_COO}"
  cfo:  "${WEBHOOK_CFO}"
  ciso: "${WEBHOOK_CISO}"
